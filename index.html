<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="style.css" media="screen">
    <script type="text/javascript">
    function idade(){
        var nasc = prompt ("Digite o ano de nascimento:", "")
        var atual = prompt ("Digite o ano atual:", "")
            var id1 = atual - nasc
                alert("Sua idade: " + id1)
            var id2 = 2050 - nasc   
             alert("Sua idade em 2050: " + id2)
    }
    </script>
</head>
<body>
    <input class="botao" type="button" onclick="idade()" value="Clique aqui!">
</body>
</html>
